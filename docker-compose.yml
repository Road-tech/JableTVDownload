version: '3.8'

services:
  # ---- 主下載服務 ----
  downloader:
    build: .
    image: jable-downloader:latest
    container_name: jable_downloader
    environment:
      - URL=${URL:-}                  # 透過環境變數傳入影片網址
      - RANDOM=${RANDOM:-}            # 下載隨機熱門影片 (true/false)
      - ALL_URLS=${ALL_URLS:-}        # 下載演員所有影片 (演員頁網址)
      - CONFIG=${CONFIG:-}            # 自訂設定檔路徑 (容器內)
      - PROXY=${PROXY:-}              # 代理位址 (http://proxy.example.com:8080)
      - ENABLE_PROXY=${ENABLE_PROXY:-} # 啟用代理 (true)
      - DISABLE_PROXY=${DISABLE_PROXY:-} # 停用代理 (true)
      - COVER=${COVER:-}              # 是否下載封面 (true/false)
      - ENCODE=${ENCODE:-}            # 是否轉碼 (true/false)
      - QUALITY=${QUALITY:-}          # 轉碼品質 (1/2/3)
    volumes:
      - ./downloads:/downloads        # 本機 downloads 資料夾 ←→ 容器內 /downloads
      - ./config.json:/app/config.json  # 本機 config.json ←→ 容器內 (選擇性)
    stdin_open: true                  # 保持 stdin 開啟（互動模式）
    tty: true

  # ---- (可選) Redis 任務佇列 ----
  # 未來擴充成多任務排隊下載時使用
  redis:
    image: redis:7-alpine
    container_name: jable_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
